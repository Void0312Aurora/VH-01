seed: 7
output_dir: runs/real_ucf101_subset_semantic_identity_residual_semantic_prototype_query_balanced_continuous_measure_response_jet_graph_tau

data:
  kind: folder
  root: data/real/ucf101_subset_semantic
  manifest_path: data/real/ucf101_subset_semantic/train.jsonl
  val_manifest_path: data/real/ucf101_subset_semantic/val.jsonl
  train_size: 0
  val_size: 0
  seq_len: 8
  image_size: 32
  channels: 3
  num_workers: 4

model:
  latent_dim: 64
  cond_dim: 64
  hidden_dim: 128
  base_channels: 32
  condition_score_mode: energy
  energy_hidden_dim: 128
  identity_num_classes: 10
  identity_hidden_dim: 128
  semantic_num_classes: 10
  semantic_temperature: 0.2
  chart_hidden_dim: 128
  response_context_dim: 16
  response_signature_mode: full_triangle
  tangent_dim: 8
  local_measure_hidden_dim: 128
  local_measure_rank: 8
  local_measure_eps: 0.0001
  local_diffusion_geometry_mode: tangent
  measure_density_mode: tilted

train:
  batch_size: 8
  epochs: 10
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  log_every: 20
  sample_every: 2
  gradient_clip_norm: 1.0
  device: auto
  stage1_epochs: 2
  stage2_epochs: 4
  stage3_epochs: 8
  identity_start_epoch: 2
  identity_warmup_epochs: 3
  query_eval_enabled: true
  query_eval_alpha: 0.90
  query_eval_obs_alpha: 0.90
  query_eval_plan_core_alpha: 0.50
  query_eval_posterior_temperature: 2.0
  query_eval_max_samples: 80
  checkpoint_selection_mode: query_balanced
  query_checkpoint_fallback_budget: 0.05
  query_checkpoint_exec_weight: 1.0
  query_checkpoint_match_weight: 0.20
  query_checkpoint_support_weight: 0.05
  query_checkpoint_gap_weight: 0.25
  measure_target_ema_decay: 0.99
  measure_target_use_teacher_eval: true

loss:
  base_weight: 1.0
  rep_weight: 0.05
  loc_weight: 0.05
  loc_eps: 0.01
  dyn_weight: 0.5
  cond_weight: 0.5
  reg_weight: 0.01
  gap_weight: 0.5
  condition_dyn_weight: 0.5
  delta_reg_weight: 0.5
  delta_temporal_weight: 0.5
  identity_weight: 0.10
  identity_ortho_weight: 0.10
  semantic_proto_weight: 0.20
  semantic_center_weight: 0.05
  semantic_proto_sep_weight: 0.02
  hard_negative_prob: 0.75
  max_negative_edits: 2
  support_p_true_weight: 0.20
  support_margin_weight: 0.10
  support_ratio_weight: 0.20
  support_p_true_floor: 0.16
  support_margin_floor: 0.02
  support_ratio_ceiling: 0.88
  support_gate_p_true: 0.14
  support_gate_margin: 0.01
  support_gate_temperature: 0.04
  local_drift_weight: 0.10
  local_diffusion_weight: 0.05
  measure_stationarity_weight: 0.02
  measure_trace_weight: 0.05
  response_smoothness_weight: 0.05
  tangent_projection_weight: 0.05
  tangent_compatibility_weight: 0.05
  tangent_spectrum_weight: 0.05
  tangent_shape_weight: 0.10
  measure_tilt_target_weight: 0.02
  response_signature_knn: 4
  response_signature_temperature: 0.5
  response_geometry_knn: 8
  response_geometry_temperature: 0.5
  response_jet_ridge: 0.001
  response_jet_center_weight: 1.0
  response_tau_ridge: 0.001
  response_tau_mean_penalty: 1.0
  response_tau_drift_scale: 0.0
  measure_density_temperature: 1.0
  measure_test_num_directions: 8
  measure_trig_scale: 1.0
  diffusion_target_mode: full
  measure_target_mode: response_jet
  measure_target_blend: 1.0
  drift_target_mode: response_jet
  drift_target_blend: 1.0
  tilt_target_mode: graph_tau
  tilt_target_blend: 1.0
