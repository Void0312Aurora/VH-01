seed: 7
output_dir: runs/shorttrain_continuous_measure_chart_target

data:
  kind: synthetic
  train_size: 2048
  val_size: 256
  seq_len: 8
  image_size: 32
  channels: 3
  num_workers: 4
  root: ""
  manifest_path: ""
  val_manifest_path: ""

model:
  latent_dim: 48
  cond_dim: 64
  hidden_dim: 128
  base_channels: 24
  chart_hidden_dim: 128
  local_measure_hidden_dim: 128
  local_measure_rank: 6
  local_measure_eps: 0.0001

train:
  batch_size: 32
  epochs: 6
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  log_every: 10
  sample_every: 1
  gradient_clip_norm: 1.0
  device: auto
  stage1_epochs: 1
  stage2_epochs: 2
  stage3_epochs: 3
  checkpoint_selection_mode: measure

loss:
  base_weight: 1.0
  rep_weight: 0.05
  loc_weight: 0.02
  loc_eps: 0.01
  dyn_weight: 0.5
  cond_weight: 0.25
  reg_weight: 0.01
  gap_weight: 0.25
  condition_dyn_weight: 0.5
  delta_reg_weight: 0.5
  delta_temporal_weight: 0.5
  hard_negative_prob: 0.75
  max_negative_edits: 2
  local_drift_weight: 0.10
  local_diffusion_weight: 0.05
  measure_stationarity_weight: 0.02
  response_smoothness_weight: 0.05
  response_signature_knn: 4
  response_signature_temperature: 0.5
  measure_density_temperature: 1.0
  measure_test_num_directions: 8
  measure_trig_scale: 1.0
