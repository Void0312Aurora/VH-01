seed: 7
output_dir: runs/real_ucf101_subset_semantic_continuous_measure_bootstrap

data:
  kind: folder
  root: data/real/ucf101_subset_semantic
  manifest_path: data/real/ucf101_subset_semantic/train.jsonl
  val_manifest_path: data/real/ucf101_subset_semantic/val.jsonl
  train_size: 0
  val_size: 0
  seq_len: 8
  image_size: 32
  channels: 3
  num_workers: 4

model:
  latent_dim: 64
  cond_dim: 64
  hidden_dim: 128
  base_channels: 32
  condition_score_mode: energy
  energy_hidden_dim: 128
  identity_num_classes: 10
  identity_hidden_dim: 128
  semantic_num_classes: 10
  semantic_temperature: 0.2
  chart_hidden_dim: 128
  local_measure_hidden_dim: 128
  local_measure_rank: 8
  local_measure_eps: 0.0001

train:
  batch_size: 8
  epochs: 10
  lr: 0.0003
  weight_decay: 0.00001
  amp: true
  log_every: 20
  sample_every: 2
  gradient_clip_norm: 1.0
  device: auto
  stage1_epochs: 0
  stage2_epochs: 0
  stage3_epochs: 0
  identity_start_epoch: 2
  identity_warmup_epochs: 3
  checkpoint_selection_mode: measure

loss:
  base_weight: 1.0
  rep_weight: 0.05
  loc_weight: 0.05
  loc_eps: 0.01
  dyn_weight: 0.5
  cond_weight: 0.5
  reg_weight: 0.01
  gap_weight: 0.5
  condition_dyn_weight: 0.5
  delta_reg_weight: 0.5
  delta_temporal_weight: 0.5
  identity_weight: 0.10
  identity_ortho_weight: 0.10
  semantic_proto_weight: 0.20
  semantic_center_weight: 0.05
  semantic_proto_sep_weight: 0.02
  hard_negative_prob: 0.75
  max_negative_edits: 2
  support_p_true_weight: 0.0
  support_margin_weight: 0.0
  support_ratio_weight: 0.0
  local_drift_weight: 0.10
  local_diffusion_weight: 0.05
  measure_stationarity_weight: 0.02
  response_smoothness_weight: 0.05
  response_signature_knn: 4
  response_signature_temperature: 0.5
  measure_density_temperature: 1.0
  measure_test_num_directions: 8
  measure_trig_scale: 1.0
